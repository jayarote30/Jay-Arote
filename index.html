<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jay Arote Portfolio</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #0f172a;
      color: white;
    }

    header {
      background: #1e293b;
      padding: 20px;
      text-align: center;
    }

    header h1 {
      font-size: 32px;
      color: #38bdf8;
    }

    nav {
      margin-top: 10px;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      transition: 0.3s;
    }

    nav a:hover {
      color: #38bdf8;
    }

    section {
      padding: 50px;
      text-align: center;
    }

    .hero img {
      width: 150px;
      border-radius: 50%;
      margin-top: 20px;
      border: 3px solid #38bdf8;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background: #38bdf8;
      color: black;
      border-radius: 5px;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background: white;
    }

    .projects {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      width: 250px;
      transition: transform 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    footer {
      background: #1e293b;
      padding: 20px;
      text-align: center;
      margin-top: 30px;
    }
  </style>
</head>

<body>

<header>
  <h1>Jay Arote</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#about">About</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section class="hero">
  <h2>Hello, I'm a Web Developer 👋</h2>
  <img src="https://via.placeholder.com/150" alt="profile">
  <br>
  <a href="#projects" class="btn">View My Work</a>
</section>

<section id="about">
  <h2>About Me</h2>
  <p>I am a passionate developer learning HTML, CSS, and JavaScript.</p>
</section>

<section id="projects">
  <h2>My Projects</h2>
  <div class="projects">

    <div class="card">
      <img src="https://via.placeholder.com/250">
      <h3>Project 1</h3>
      <p>My first project</p>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/250">
      <h3>Project 2</h3>
      <p>My second project</p>
    </div>

  </div>
</section>

<section id="contact">
  <h2>Contact Me</h2>
  <p>Email: your@email.com</p>
</section>

<footer>
  <p>© 2026 Jay Arote</p>
</footer>

</body>
</html>
